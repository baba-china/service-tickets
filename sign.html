<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>技术服务确认单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --paper: #fafaf8;
    --ink: #1a1a1a;
    --ink2: #444;
    --ink3: #888;
    --line: #ddd;
    --line2: #eee;
    --accent: #1a3a8a;
    --accent-soft: #e8edf8;
    --green: #1a7a4a;
    --green-soft: #e8f5ee;
    --red: #c0392b;
    --radius: 8px;
    --font: 'Noto Sans SC', sans-serif;
    --serif: 'Noto Serif SC', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0ec; font-family: var(--font); color: var(--ink); min-height: 100vh; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; color: #888; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { max-width: 400px; margin: 80px auto; text-align: center; padding: 20px; }
  .error-state h2 { font-size: 18px; margin-bottom: 8px; }
  .error-state p { color: #888; font-size: 13px; }

  .page-wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 48px; }

  /* Document */
  .doc { background: #fff; box-shadow: 0 2px 24px rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; }
  .doc-header { background: var(--accent); color: #fff; padding: 28px 36px; position: relative; }
  .doc-header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); }
  .doc-title { font-family: var(--serif); font-size: 22px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 12px; }
  .doc-meta { display: flex; gap: 32px; }
  .doc-meta-item { font-size: 12px; opacity: 0.85; }
  .doc-meta-item strong { display: block; font-size: 13px; font-weight: 700; opacity: 1; margin-bottom: 2px; }

  .doc-body { padding: 0 36px 36px; }

  /* Info grid */
  .info-section { padding: 20px 0; border-bottom: 1px solid var(--line2); }
  .info-section-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--line); }
  .info-cell { padding: 10px 14px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .info-cell:nth-child(2n) { border-right: none; }
  .info-cell:nth-last-child(-n+2) { border-bottom: none; }
  .info-cell-label { font-size: 11px; color: var(--ink3); margin-bottom: 3px; }
  .info-cell-value { font-size: 13px; font-weight: 500; color: var(--ink); min-height: 18px; }

  /* Service table */
  .service-section { padding: 20px 0; border-bottom: 1px solid var(--line2); }
  .service-table { width: 100%; border: 1px solid var(--line); border-collapse: collapse; }
  .service-table td, .service-table th { padding: 10px 14px; border: 1px solid var(--line); font-size: 13px; vertical-align: top; }
  .service-table .label-cell { width: 26%; background: #f8f8f6; font-weight: 500; color: var(--ink2); font-size: 12px; }
  .types-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .type-tag { background: var(--accent-soft); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .result-solved { color: var(--green); font-weight: 600; }
  .result-partial { color: #c07000; font-weight: 600; }
  .result-unsolved { color: var(--red); font-weight: 600; }

  /* Signature area */
  .sign-section { padding: 24px 0 0; }
  .sign-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .sign-desc { font-size: 13px; color: var(--ink2); margin-bottom: 16px; line-height: 1.7; background: var(--accent-soft); padding: 12px 16px; border-radius: var(--radius); border-left: 3px solid var(--accent); }
  .canvas-wrap { border: 1.5px solid var(--line); border-radius: var(--radius); background: var(--paper); position: relative; overflow: hidden; }
  .canvas-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 14px; pointer-events: none; transition: opacity 0.2s; user-select: none; }
  canvas { display: block; width: 100%; touch-action: none; }
  .sign-actions { display: flex; gap: 10px; margin-top: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; justify-content: center; font-size: 14px; padding: 13px; }
  .btn-primary:hover { background: #2a4ab0; box-shadow: 0 4px 16px rgba(26,58,138,0.3); }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; box-shadow: none; }
  .btn-ghost { background: transparent; color: var(--ink3); border: 1px solid var(--line); padding: 10px 16px; }
  .btn-ghost:hover { border-color: #aaa; color: var(--ink2); }

  /* Readonly signed state */
  .signed-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--green-soft); color: var(--green); border: 1px solid #b8e0c8; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  .signature-img { max-width: 300px; border: 1px solid var(--line); border-radius: var(--radius); padding: 8px; background: var(--paper); }
  .dl-btn { background: var(--ink); color: #fff; padding: 10px 22px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; }
  .dl-btn:hover { background: #333; }

  /* Success */
  .success-banner { background: var(--green-soft); border: 1px solid #b8e0c8; border-radius: var(--radius); padding: 16px 20px; text-align: center; margin-top: 24px; display: none; }
  .success-banner h3 { color: var(--green); font-size: 16px; margin-bottom: 6px; }
  .success-banner p { color: #444; font-size: 13px; }

  @media (max-width: 600px) {
    .doc-header { padding: 20px; }
    .doc-body { padding: 0 16px 24px; }
    .doc-title { font-size: 16px; }
    .doc-meta { flex-direction: column; gap: 6px; }
    .info-grid { grid-template-columns: 1fr; }
    .info-cell:nth-child(2n) { border-right: 1px solid var(--line); }
    .info-cell:nth-last-child(-n+2) { border-bottom: 1px solid var(--line); }
    .info-cell:last-child { border-bottom: none; }
  }
</style>
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div><span>加载服务单中…</span></div>
<div id="error-state" class="error-state" style="display:none;">
  <h2>链接无效或已过期</h2>
  <p>请联系技术工程师重新发送服务单链接</p>
</div>
<div id="app" style="display:none;"></div>

<script>
// ── CONFIG (与 index.html 共用 localStorage) ──────────────
const SUPABASE_URL = localStorage.getItem('sb_url') || 'https://ttkpvjecqobdqiswptdq.supabase.co';
const SUPABASE_KEY = localStorage.getItem('sb_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0a3B2amVjcW9iZHFpc3dwdGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODMxNTEsImV4cCI6MjA5NDE1OTE1MX0.i7CmNmLnpcW7vPsi9Ie6RFHPI9V7AsmJQRXxkvHrF-4';
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
const READONLY = params.get('readonly') === '1';
let ticket = null;
let sigPad = null;

async function init() {
  if (!TOKEN) { show('error'); return; }
  const { data, error } = await client.from('service_tickets').select('*').eq('token', TOKEN).single();
  if (error || !data) { show('error'); return; }
  ticket = data;
  render();
  show('app');
}

function show(id) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = id==='error' ? '' : 'none';
  document.getElementById('app').style.display = id==='app' ? '' : 'none';
}

function resultClass(r) {
  if (!r) return '';
  if (r.startsWith('已解决')) return 'result-solved';
  if (r.startsWith('部分')) return 'result-partial';
  return 'result-unsolved';
}

function render() {
  const t = ticket;
  const isAlreadySigned = t.status === 'signed';
  const typeTags = (t.service_types || '').split('、').filter(Boolean).map(s => `<span class="type-tag">${s}</span>`).join('');

  let signBlock = '';
  if (isAlreadySigned || READONLY) {
    signBlock = `
      <div class="sign-section">
        <div class="sign-title">二、客户签名</div>
        ${isAlreadySigned ? '<div class="signed-badge">✓ 客户已确认签名，服务完成</div>' : ''}
        ${t.signature ? `<img class="signature-img" src="${t.signature}" alt="客户签名">` : '<p style="color:#aaa;font-size:13px;">暂无签名</p>'}
      </div>`;
  } else {
    signBlock = `
      <div class="sign-section">
        <div class="sign-title">二、客户签名确认</div>
        <div class="sign-desc">请确认以上服务内容属实，在下方空白区域<strong>手写签名</strong>，完成后点击「确认并提交」，即表示确认本次技术服务已完成。</div>
        <div class="canvas-wrap" id="canvas-wrap">
          <div class="canvas-hint" id="canvas-hint">← 请在此处手写签名 →</div>
          <canvas id="sig-canvas"></canvas>
        </div>
        <div class="sign-actions">
          <button class="btn btn-ghost" onclick="clearSig()">清除重写</button>
          <button class="btn btn-primary" id="submit-btn" onclick="submitSig()" disabled>确认并提交</button>
        </div>
        <div id="success-banner" class="success-banner">
          <h3>✓ 签名已提交，服务确认完成！</h3>
          <p>感谢您的配合，本次技术服务记录已保存。</p>
        </div>
      </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="page-wrap">
      <div class="doc">
        <div class="doc-header">
          <div class="doc-title">远程技术服务确认单</div>
          <div class="doc-meta">
            <div class="doc-meta-item"><strong>单号</strong>${t.ticket_no}</div>
            <div class="doc-meta-item"><strong>日期</strong>${t.date}</div>
            <div class="doc-meta-item"><strong>状态</strong>${isAlreadySigned ? '✓ 已完成' : '待签名'}</div>
          </div>
        </div>
        <div class="doc-body">
          <div class="info-section">
            <div class="info-section-title">基本信息</div>
            <div class="info-grid">
              <div class="info-cell"><div class="info-cell-label">客户公司</div><div class="info-cell-value">${t.customer_company||'—'}</div></div>
              <div class="info-cell"><div class="info-cell-label">服务方名称</div><div class="info-cell-value">${t.service_company||'—'}</div></div>
              <div class="info-cell"><div class="info-cell-label">联系人</div><div class="info-cell-value">${t.customer_contact||'—'}</div></div>
              <div class="info-cell"><div class="info-cell-label">技术工程师</div><div class="info-cell-value">${t.engineer_name||'—'}</div></div>
              <div class="info-cell"><div class="info-cell-label">客户联系电话</div><div class="info-cell-value">${t.customer_phone||'—'}</div></div>
              <div class="info-cell"><div class="info-cell-label">工程师联系电话</div><div class="info-cell-value">${t.engineer_phone||'—'}</div></div>
            </div>
          </div>
          <div class="service-section">
            <div class="info-section-title">一、服务内容及结果</div>
            <table class="service-table">
              <tr><td class="label-cell">服务类型</td><td><div class="types-wrap">${typeTags||'—'}</div></td></tr>
              <tr><td class="label-cell">问题描述</td><td>${t.problem_desc||'—'}</td></tr>
              <tr><td class="label-cell">处理过程</td><td>${t.process_desc||'—'}</td></tr>
              <tr><td class="label-cell">处理结果</td><td class="${resultClass(t.result)}">${t.result||'—'}</td></tr>
              <tr><td class="label-cell">服务时长</td><td>${t.duration||'—'}</td></tr>
            </table>
          </div>
          ${signBlock}
        </div>
      </div>
      ${isAlreadySigned ? `<div style="text-align:center;margin-top:16px;"><button class="dl-btn" onclick="downloadPDF()">↓ 下载 PDF 存档</button></div>` : ''}
    </div>`;

  if (!isAlreadySigned && !READONLY) initSigPad();
}

function initSigPad() {
  const canvas = document.getElementById('sig-canvas');
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.offsetWidth * window.devicePixelRatio;
  canvas.height = 160 * window.devicePixelRatio;
  canvas.style.height = '160px';
  canvas.getContext('2d').scale(window.devicePixelRatio, window.devicePixelRatio);
  sigPad = new SignaturePad(canvas, { penColor: '#1a1a1a', minWidth: 1, maxWidth: 3 });
  sigPad.addEventListener('beginStroke', () => {
    document.getElementById('canvas-hint').style.opacity = '0';
    document.getElementById('submit-btn').disabled = false;
  });
}

function clearSig() {
  if (sigPad) { sigPad.clear(); document.getElementById('submit-btn').disabled = true; document.getElementById('canvas-hint').style.opacity = '1'; }
}

async function submitSig() {
  if (!sigPad || sigPad.isEmpty()) { alert('请先完成签名'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '提交中…';
  const sigData = sigPad.toDataURL('image/png');
  const { error } = await client.from('service_tickets').update({ signature: sigData, status: 'signed', signed_at: new Date().toISOString() }).eq('token', TOKEN);
  if (error) { btn.disabled = false; btn.textContent = '确认并提交'; alert('提交失败，请重试：' + error.message); return; }
  document.getElementById('success-banner').style.display = '';
  btn.textContent = '已提交 ✓';
  document.querySelector('.canvas-wrap').style.pointerEvents = 'none';
  document.querySelector('.btn-ghost').style.display = 'none';
  ticket.status = 'signed';
}

// ── PDF EXPORT ────────────────────────────────────────────
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ format: 'a4', unit: 'mm' });
  const t = ticket;
  const lm = 20, rm = 190, cw = 170;
  let y = 20;
  const line = () => { doc.setDrawColor(200); doc.line(lm, y, rm, y); y += 1; };
  const nl = (n=5) => { y += n; };

  doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(26,58,138);
  doc.text('Remote Technical Service Confirmation', 105, y, {align:'center'}); nl(8);
  doc.setFontSize(10); doc.setTextColor(100);
  doc.text(`No: ${t.ticket_no}   Date: ${t.date}`, 105, y, {align:'center'}); nl(8);
  line(); nl(6);

  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0);
  doc.text('Basic Information', lm, y); nl(6);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60);
  const rows = [
    ['Customer:', t.customer_company||'—', 'Service Provider:', t.service_company||'—'],
    ['Contact:', t.customer_contact||'—', 'Engineer:', t.engineer_name||'—'],
    ['Customer Tel:', t.customer_phone||'—', 'Engineer Tel:', t.engineer_phone||'—'],
  ];
  rows.forEach(r => { doc.text(r[0], lm, y); doc.text(r[1], lm+28, y); doc.text(r[2], 110, y); doc.text(r[3], 138, y); nl(6); });
  nl(2); line(); nl(6);

  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0);
  doc.text('I. Service Content & Result', lm, y); nl(6);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60);
  const fields = [['Service Type:', t.service_types||'—'],['Problem:', t.problem_desc||'—'],['Process:', t.process_desc||'—'],['Result:', t.result||'—'],['Duration:', t.duration||'—']];
  fields.forEach(([label, val]) => {
    doc.setFont('helvetica','bold'); doc.setTextColor(80); doc.text(label, lm, y);
    doc.setFont('helvetica','normal'); doc.setTextColor(60);
    const lines = doc.splitTextToSize(val, cw-28);
    doc.text(lines, lm+30, y); nl(lines.length * 5 + 3);
  });
  nl(2); line(); nl(6);

  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(0);
  doc.text('II. Customer Signature', lm, y); nl(6);
  if (t.signature) {
    try { doc.addImage(t.signature, 'PNG', lm, y, 60, 25); nl(30); } catch(e) {}
  }
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120);
  if (t.signed_at) doc.text('Signed at: ' + new Date(t.signed_at).toLocaleString('zh-CN'), lm, y);

  doc.save(`服务单-${t.ticket_no}.pdf`);
}

init();
</script>
</body>
</html>
